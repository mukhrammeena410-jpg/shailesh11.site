<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shailesh11</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:linear-gradient(135deg,#000000,#111111,#1f1f1f);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
color:white;
overflow:hidden;
}

.container{
text-align:center;
padding:40px;
border-radius:25px;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(10px);
box-shadow:0 0 30px rgba(0,255,255,0.3);
width:90%;
max-width:400px;
animation:fade 1s ease;
}

h1{
font-size:45px;
margin-bottom:15px;
color:#00ffff;
text-shadow:0 0 15px #00ffff;
}

p{
font-size:18px;
margin-bottom:30px;
color:#ddd;
}

button{
padding:15px 35px;
font-size:18px;
border:none;
border-radius:50px;
background:#00ffff;
color:black;
font-weight:bold;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:scale(1.1);
box-shadow:0 0 20px #00ffff;
}

@keyframes fade{
from{
opacity:0;
transform:translateY(40px);
}
to{
opacity:1;
transform:translateY(0);
}
}

.circle{
position:absolute;
width:300px;
height:300px;
background:#00ffff22;
border-radius:50%;
filter:blur(100px);
}

.c1{
top:-100px;
left:-100px;
}

.c2{
bottom:-100px;
right:-100px;
}
</style>
</head>

<body>

<div class="circle c1"></div>
<div class="circle c2"></div>

<div class="container">
<h1>SHAILESH 🔥</h1>
<p>Welcome to my powerful website</p>

<button onclick="alert('WELCOME BRO 😎')">
ENTER
</button>
</div>

</body>
</html>
